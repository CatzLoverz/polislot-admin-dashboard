# ============================================================
# PoliSlot Admin Dashboard — Docker Compose (Deployment)
# ============================================================
# Folder deploy berisi:
#   docker-compose.yml  (file ini)
#   .env                (konfigurasi rahasia)
#   private_key.pem     (RSA key enkripsi API)
#   mariadb.cnf         (konfigurasi logging MariaDB)
#   mosquitto.conf      (konfigurasi Mosquitto)
#   logrotate-entrypoint.sh
#   mosquitto/          (akan dibuat otomatis)
#   storage/            (akan dibuat otomatis)
# ============================================================

services:

  # === App: Laravel + Reverb + Queue (all-in-one via Supervisor) ===
  app:
    image: catzloverz/polislot-admin-dashboard:latest
    container_name: polislot_app
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"     # Web + WebSocket (semua lewat Caddy)
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage/public:/var/www/html/storage/app/public
      - ./storage/logs/laravel:/var/www/html/storage/logs
      - ./storage/backups:/var/www/html/storage/app/backups
      - ./private_key.pem:/var/www/html/storage/app/private/keys/private_key.pem
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polislot_net
    environment:
      - SERVER_NAME=:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Database: MariaDB ===
  db:
    image: mariadb:latest
    container_name: polislot_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - dbdata:/var/lib/mysql
      - ./mariadb.cnf:/etc/mysql/conf.d/logging.cnf
      - ./storage/logs/mariadb:/var/log/mysql
    ports:
      - "127.0.0.1:3308:3306"
    networks:
      - polislot_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Log Rotation Sidecar ===
  logrotate:
    image: alpine:latest
    container_name: polislot_logrotate
    restart: unless-stopped
    entrypoint: ["sh", "/usr/local/bin/logrotate-entrypoint.sh"]
    volumes:
      - ./storage/logs/mariadb:/var/log/mysql
      - ./logrotate-entrypoint.sh:/usr/local/bin/logrotate-entrypoint.sh
    depends_on:
      - db
    networks:
      - polislot_net

  # === MQTT Broker: Mosquitto ===
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: polislot_mosquitto
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883" # TCP untuk Laravel
      - "0.0.0.0:9001:9001"   # WebSockets untuk Cloudflare Tunnel
    environment:
      - MQTT_AUTH_USERNAME=${MQTT_AUTH_USERNAME:-polislot_user}
      - MQTT_AUTH_PASSWORD=${MQTT_AUTH_PASSWORD:-secure_password}
      - MQTT_MOBILE_USERNAME=${MQTT_MOBILE_USERNAME:-polislot_mobile}
      - MQTT_MOBILE_PASSWORD=${MQTT_MOBILE_PASSWORD:-mobile_secure_password}
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto:/mosquitto
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command: >
      sh -c "
      mkdir -p /mosquitto &&
      touch /mosquitto/mosquitto.passwd &&
      (chown root:root /mosquitto/mosquitto.passwd 2>/dev/null || true) &&
      (chmod 0700 /mosquitto/mosquitto.passwd 2>/dev/null || true) &&
      mosquitto_passwd -b /mosquitto/mosquitto.passwd \$${MQTT_AUTH_USERNAME} \$${MQTT_AUTH_PASSWORD} &&
      mosquitto_passwd -b /mosquitto/mosquitto.passwd \$${MQTT_MOBILE_USERNAME} \$${MQTT_MOBILE_PASSWORD} &&
      (chown mosquitto:mosquitto /mosquitto/mosquitto.passwd 2>/dev/null || true) &&
      (chmod 0700 /mosquitto/mosquitto.passwd 2>/dev/null || true) &&
      echo \"user \$${MQTT_AUTH_USERNAME}\" > /mosquitto/mosquitto.acl &&
      echo \"topic readwrite #\" >> /mosquitto/mosquitto.acl &&
      echo \"\" >> /mosquitto/mosquitto.acl &&
      echo \"user \$${MQTT_MOBILE_USERNAME}\" >> /mosquitto/mosquitto.acl &&
      echo \"topic read frontend/#\" >> /mosquitto/mosquitto.acl &&
      (chown mosquitto:mosquitto /mosquitto/mosquitto.acl 2>/dev/null || true) &&
      (chmod 0700 /mosquitto/mosquitto.acl 2>/dev/null || true) &&
      exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      "
    networks:
      - polislot_net

  # === Scheduler: Laravel Cron ===
  scheduler:
    image: catzloverz/polislot-admin-dashboard:latest
    container_name: polislot_scheduler
    command: php artisan schedule:work
    restart: always
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage/public:/var/www/html/storage/app/public
      - ./storage/logs/laravel:/var/www/html/storage/logs
      - ./storage/backups:/var/www/html/storage/app/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polislot_net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Cloudflare Tunnel (optional, uncomment jika butuh) ===
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: polislot_tunnel
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${TUNNEL_TOKEN}
  #   networks:
  #     - polislot_net

networks:
  polislot_net:
    driver: bridge

volumes:
  dbdata:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
