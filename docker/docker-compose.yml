# ============================================================
# PoliSlot Admin Dashboard — Docker Compose
# ============================================================
# Includes: App (FrankenPHP + Reverb + Queue Worker),
#           MariaDB, Log Rotation Sidecar, Scheduler

services:

  # === App: Laravel + Reverb + Queue (all-in-one via Supervisor) ===
  app:
    image: catzloverz/polislot-admin-dashboard:latest
    container_name: polislot_app
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"     # Web Server (FrankenPHP)
      - "0.0.0.0:6001:8080"   # Reverb WebSocket (exposed ke host port 6001)
    volumes:
      # Mount file .env (Host -> Container)
      - ./.env:/var/www/html/.env
      # Gunakan named volume untuk storage (agar data upload persisten)
      - ./storage/public:/var/www/html/storage/app/public
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/backups:/var/www/html/storage/app/backups
      - ./private_key.pem:/var/www/html/storage/app/private/keys/private_key.pem
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polislot_net
    env_file:
      - .env
    environment:
      - SERVER_NAME=:80
      # Override agar PHP backend broadcast ke Reverb via localhost container
      - REVERB_HOST=127.0.0.1
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REVERB_SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Database: MariaDB ===
  db:
    image: mariadb:latest
    container_name: polislot_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: '...' # Ganti dengan password root yang aman 
    volumes:
      - dbdata:/var/lib/mysql
      # Mount Config Logging
      - ./mariadb.cnf:/etc/mysql/conf.d/logging.cnf:ro
      # Mount Folder Log ke Host
      - ./storage/logs/mariadb:/var/log/mysql
    ports:
      - "127.0.0.1:3308:3306"
    networks:
      - polislot_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Log Rotation Sidecar ===
  logrotate:
    image: alpine:latest
    container_name: polislot_logrotate
    restart: unless-stopped
    entrypoint: ["sh", "/usr/local/bin/logrotate-entrypoint.sh"]
    volumes:
      - ./storage/logs/mariadb:/var/log/mysql
      - ./logrotate-entrypoint.sh:/usr/local/bin/logrotate-entrypoint.sh:ro
    depends_on:
      - db
    networks:
      - polislot_net

  # === Scheduler: Laravel Cron ===
  scheduler:
    image: catzloverz/polislot-admin-dashboard:latest
    container_name: polislot_scheduler
    command: php artisan schedule:work
    restart: always
    volumes:
      - ./.env:/var/www/html/.env
      # Mount storage lengkap agar backup database & log laravel bisa jalan
      - ./storage/public:/var/www/html/storage/app/public
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/backups:/var/www/html/storage/app/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polislot_net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Cloudflare Tunnel (optional, uncomment jika butuh) ===
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: polislot_tunnel
  #   restart: unless-stopped
  #   command: tunnel run
  #   env_file:
  #     - .env
  #   networks:
  #     - polislot_net

networks:
  polislot_net:
    driver: bridge

volumes:
  dbdata:
    driver: local
